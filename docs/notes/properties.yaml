# =============================================================================
# Ledger properties catalog
# =============================================================================
#
# This file is the human-curated CATALOG of ledger properties we care about,
# across eras. It is the single place where a property's identity, location,
# and tracking issue are declared.
#
# It deliberately does NOT declare a `status:`. Status is *derived* from the
# Agda by `scripts/python/scan_properties.py`, from the `module:` reference and
# the source on disk:
#   no module          -> idea     (identified; nothing in Agda yet)
#   module file absent -> planned  (drafted on another branch/PR; not here yet)
#   "coming soon" found-> stated   (statement present; proof pending)
#   otherwise          -> proved   (statement and proof present)
# The Agda `--safe` typecheck (run by the main CI) is what ultimately guarantees
# that a `proved` property has no holes or postulates; `scan_properties.py
# --check` (see .github/workflows/properties-check.yml) guarantees the generated
# roadmap matches what the Agda currently implies, so the bookkeeping cannot
# silently drift from the code.
#
# Workflow and conventions are documented in
#   docs/notes/0001-ledger-property-tracking.md
#
# Field reference (per property):
#   id      : stable slug, unique across the catalog (used by the scripts)
#   title   : one-line human description
#   era     : conway | dijkstra
#   sts     : the transition system the property is about (UTXO, GOV, EPOCH, ...)
#   module  : dotted Agda module path ("" if no Agda artifact exists yet)
#   anchor  : heading anchor in the .lagda.md (e.g. clm:EpochStep), "" if none
#   defs    : key Agda definitions that state/prove the property (for the reader)
#   issues  : GitHub issue numbers tracking this property ([] => create one)
#   notes   : free-form context
# (Status is NOT a field — it is computed; see meta.status_values for the
#  meaning of each derived value.)
# -----------------------------------------------------------------------------

meta:
  repo: intersectmbo/formal-ledger-specifications
  eras: [conway, dijkstra]
  # Umbrella tracking issues per era (sub-issues hang off these).
  umbrella_issues:
    conway: 45        # existing "Create properties of the governance system"
    dijkstra: null    # to be created by gh_project_populate.py
  # The DERIVED status values (computed by scan_properties.py, never declared).
  status_values:
    idea:    "Identified; no statement in Agda yet (module is \"\")."
    planned: "Statement drafted on another branch/PR; module file not on this branch."
    stated:  "Statement present in Agda as a Claim; proof pending (\"coming soon\")."
    proved:  "Statement and proof present in Agda; no pending marker; --safe typechecks."
  # STS the spec is organised around (for grouping/labels).
  sts_values: [UTXO, UTXOW, CERT, CERTS, GOV, RATIFY, ENACT, EPOCH, NEWEPOCH, POOLREAP, SNAP, LEDGER, CHAIN]

